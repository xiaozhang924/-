# ========================================
# 数据库配置文件
# Database Configuration File
# ========================================
# 
# 说明：
# 1. 此文件用于配置MySQL数据库连接信息
# 2. 修改配置后需要重新编译或重启应用程序
# 3. 密码等敏感信息请勿上传至公共代码仓库
# 
# 注意事项：
# - 确保MySQL服务已启动
# - 确保数据库student_achievement_system已创建
# - 确保用户名和密码正确
# - 端口号默认为3306，如有修改请相应调整
# ========================================

# 数据库连接URL
# 格式：jdbc:mysql://主机地址:端口号/数据库名?参数1&参数2
# useSSL=false: 关闭SSL连接（开发环境）
# serverTimezone=UTC: 设置时区为UTC，避免时区问题
# 如果小皮MySQL端口不是3306，请修改端口号
url=jdbc:mysql://localhost:3306/student_achievement_system?useSSL=false&serverTimezone=UTC

# 数据库用户名
# 默认为root，生产环境建议使用专用账户
username=root

# 数据库密码
# 请根据实际情况修改，默认为123456
password=123456

# JDBC驱动类名
# MySQL 8.x使用：com.mysql.cj.jdbc.Driver
# MySQL 5.x使用：com.mysql.jdbc.Driver
driver=com.mysql.cj.jdbc.Driver